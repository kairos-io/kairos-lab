---
name: goreleaser

"on":
  push:
    branches:
      - "test-goreleaser/**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: (dry-run) GoReleaser
        if: startsWith(github.ref_name, 'test-goreleaser')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --skip=validate,publish

      - name: Run GoReleaser
        if: startsWith(github.ref_name, 'test-goreleaser') != true
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch Homebrew formula update
        if: startsWith(github.ref_name, 'test-goreleaser') != true
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_KAIROS_DISPATCH_TOKEN }}
          HOMEBREW_KAIROS_REPO: kairos-io/homebrew-kairos
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "HOMEBREW_KAIROS_DISPATCH_TOKEN secret is required"
            exit 1
          fi

          CHECKSUM_FILE="dist/checksums.txt"
          if [ ! -f "$CHECKSUM_FILE" ]; then
            echo "missing $CHECKSUM_FILE"
            exit 1
          fi

          artifact_darwin_arm64="kairos-lab_${VERSION}_darwin_arm64.tar.gz"
          artifact_linux_amd64="kairos-lab_${VERSION}_linux_amd64.tar.gz"
          artifact_linux_arm64="kairos-lab_${VERSION}_linux_arm64.tar.gz"

          checksum_for() {
            awk -v name="$1" '$2 == name { print $1 }' "$CHECKSUM_FILE"
          }

          sha_darwin_arm64=$(checksum_for "$artifact_darwin_arm64")
          sha_linux_amd64=$(checksum_for "$artifact_linux_amd64")
          sha_linux_arm64=$(checksum_for "$artifact_linux_arm64")

          if [ -z "$sha_darwin_arm64" ] || [ -z "$sha_linux_amd64" ] ||
             [ -z "$sha_linux_arm64" ]; then
            echo "failed to resolve one or more checksums from $CHECKSUM_FILE"
            exit 1
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            "https://api.github.com/repos/$HOMEBREW_KAIROS_REPO/dispatches" \
            -d @- <<EOF
          {
            "event_type": "kairos-lab-release",
            "client_payload": {
              "version": "$VERSION",
              "sha256_darwin_arm64": "$sha_darwin_arm64",
              "sha256_linux_amd64": "$sha_linux_amd64",
              "sha256_linux_arm64": "$sha_linux_arm64"
            }
          }
          EOF
